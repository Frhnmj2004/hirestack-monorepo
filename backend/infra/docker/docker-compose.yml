services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hirelens
      POSTGRES_PASSWORD: hirelens
      POSTGRES_DB: hirelens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
